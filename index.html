<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Ai Restaurant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        
        :root { 
            --primary: #38bdf8; 
            --bg: #020617; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Poppins', 'Noto Sans Arabic', sans-serif; 
            background: radial-gradient(circle at 50% 0%, #0f172a, #020617);
            color: #fff; 
            margin: 0; 
            min-height: 100vh;
        }

        header { 
            padding: 50px 20px; 
            text-align: center;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        header h1 { 
            font-size: 2.2rem; 
            margin: 0; 
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Categories */
        #catGrid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            margin-top: 30px; 
        }

        .cat-card { 
            position: relative; 
            height: 180px; 
            border-radius: 20px; 
            overflow: hidden; 
            cursor: pointer; 
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .cat-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .cat-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .cat-overlay { 
            position: relative; z-index: 2; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.4); 
        }
        .cat-overlay h3 { font-size: 1.3rem; text-shadow: 2px 2px 10px #000; }

        /* Food Items */
        #foodSection { display: none; }
        .food-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        .food-item { 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid var(--glass-border);
        }

        .food-img { width: 100%; height: 200px; object-fit: cover; }
        .food-info { padding: 15px; text-align: right; }
        .food-info h3 { margin: 0; font-size: 1.1rem; }
        .food-price { 
            background: var(--primary); 
            color: #000; padding: 4px 12px; 
            border-radius: 8px; font-weight: 700; 
            display: inline-block; margin-top: 10px; 
        }

        .back-btn { 
            background: none; color: var(--primary); 
            border: 1px solid var(--primary); 
            padding: 8px 20px; border-radius: 50px; 
            cursor: pointer; margin-bottom: 20px;
        }

        #loader { margin-top: 100px; font-size: 1.2rem; color: var(--primary); }

        @media (max-width: 600px) {
            #catGrid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>TECH AI RESTAURANT</h1>
    <p>زاخۆ - دیزاینێ فەلاح محی الدین</p>
</header>

<div class="container">
    <div id="loader"><i class="fas fa-spinner fa-spin"></i> ل هیڤیا بارکرنێ بە...</div>
    <div id="catGrid"></div>
    <div id="foodSection">
        <button class="back-btn" onclick="showCats()"><i class="fas fa-arrow-right"></i> ڤەگەر</button>
        <h2 id="currentCatTitle" style="color: var(--primary); text-align: right;"></h2>
        <div class="food-grid" id="foodGrid"></div>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [];

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            
            dataList = rows.map(r => {
                // پاکژکرنا داتایان ژ فاریزێن زێدە
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                return { 
                    cat: c[0],     // Category
                    catImg: c[1],  // CatImage
                    name: c[2],    // Name
                    price: c[3],   // Price
                    img: c[4]      // Image
                };
            }).filter(item => item.cat && item.name);

            document.getElementById('loader').style.display = 'none';
            renderCategories();
        } catch(e) { 
            document.getElementById('loader').innerText = "کێشەیەک د هێڵێ دا هەیە.";
        }
    }

    function renderCategories() {
        const catGrid = document.getElementById('catGrid');
        catGrid.style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
        
        const categories = [...new Set(dataList.map(item => item.cat))];
        catGrid.innerHTML = '';
        
        categories.forEach(cat => {
            const item = dataList.find(i => i.cat === cat);
            catGrid.innerHTML += `
                <div class="cat-card" onclick="openCat('${cat}')">
                    <img src="${item.catImg}" class="cat-bg">
                    <div class="cat-overlay"><h3>${cat}</h3></div>
                </div>`;
        });
    }

    function openCat(catName) {
        document.getElementById('catGrid').style.display = 'none';
        document.getElementById('foodSection').style.display = 'block';
        document.getElementById('currentCatTitle').innerText = "بەشێ " + catName;
        
        const grid = document.getElementById('foodGrid');
        grid.innerHTML = '';
        const filtered = dataList.filter(item => item.cat === catName);
        
        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="food-item">
                    <img src="${item.img}" class="food-img">
                    <div class="food-info">
                        <h3>${item.name}</h3>
                        <span class="food-price">${item.price} IQD</span>
                    </div>
                </div>`;
        });
        window.scrollTo(0,0);
    }

    function showCats() {
        document.getElementById('catGrid').style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
    }

    loadData();
</script>
</body>
</html>
