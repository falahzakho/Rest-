<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | خوارنگەها تێک</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');
        
        :root {
            --primary: #38bdf8;
            --gold: #fbbf24;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: #fff;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 2.2rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* لێرە تەنێ بەش دیار دبن */
        #catGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .cat-card {
            position: relative;
            height: 200px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: 0.4s;
        }

        .cat-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        
        .cat-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        
        .cat-overlay {
            position: relative; z-index: 2; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4);
        }

        .cat-overlay h3 { font-size: 1.5rem; font-weight: 700; text-shadow: 2px 2px 10px #000; }

        /* لێرە خوارنێن هەر بەشەکێ دیار دبن */
        #foodSection { display: none; }
        
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .food-card {
            background: var(--glass);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .food-photo { width: 100%; height: 220px; object-fit: cover; }
        
        .food-info { padding: 20px; text-align: right; }
        
        .price-tag {
            background: var(--primary);
            color: #000;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: 700;
            display: inline-block;
            margin-top: 10px;
        }

        .back-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 30px;
            font-weight: 700;
        }

        #loader { text-align: center; margin-top: 50px; font-size: 1.2rem; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <h1>TECH REST</h1>
    <p>زاخۆ - ب سەرپەرشتیا فەلاح محی الدین</p>
</header>

<div class="container">
    <div id="loader"><i class="fas fa-spinner fa-spin"></i> ل هیڤیا تشتێن خۆش بە...</div>
    
    <!-- لاپەڕێ سەرەکی: بەش -->
    <div id="catGrid"></div>

    <!-- لاپەڕێ دویێ: خوارنێن وی بەشی -->
    <div id="foodSection">
        <button class="back-btn" onclick="showCats()"><i class="fas fa-arrow-right"></i> ڤەگەر بۆ بەشان</button>
        <h2 id="currentCatTitle" style="color: var(--gold); text-align: right; margin-bottom: 20px;"></h2>
        <div class="food-grid" id="foodGrid"></div>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [];

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            
            dataList = rows.map(r => {
                // پاکژکرنا داتایان ژ فاریزێن د ناڤ دەق دا
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                return {
                    cat: c[0],     // بەش (A)
                    catImg: c[1],  // وێنەیێ بەش (B)
                    name: c[2],    // ناڤێ خوارنێ (C)
                    price: c[3],   // قیمت (D)
                    img: c[4]      // وێنەیێ خوارنێ (E)
                };
            }).filter(item => item.cat && item.name);

            document.getElementById('loader').style.display = 'none';
            renderCategories();
        } catch(e) {
            document.getElementById('loader').innerText = "کێشەیەک د ئینتەرنێتێ دا هەیە.";
        }
    }

    function renderCategories() {
        const catGrid = document.getElementById('catGrid');
        catGrid.style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
        
        // جوداکرنا بەشان بێی دووبارەبوون
        const categories = [...new Set(dataList.map(item => item.cat))];
        catGrid.innerHTML = '';
        
        categories.forEach(cat => {
            const item = dataList.find(i => i.cat === cat);
            catGrid.innerHTML += `
                <div class="cat-card" onclick="openCat('${cat}')">
                    <img src="${item.catImg}" class="cat-img">
                    <div class="cat-overlay">
                        <h3>${cat}</h3>
                    </div>
                </div>`;
        });
    }

    function openCat(catName) {
        document.getElementById('catGrid').style.display = 'none';
        document.getElementById('foodSection').style.display = 'block';
        document.getElementById('currentCatTitle').innerText = "بەشێ " + catName;
        
        const grid = document.getElementById('foodGrid');
        grid.innerHTML = '';
        const filtered = dataList.filter(item => item.cat === catName);
        
        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="food-card">
                    <img src="${item.img}" class="food-photo">
                    <div class="food-info">
                        <h3>${item.name}</h3>
                        <span class="price-tag">${item.price} IQD</span>
                    </div>
                </div>`;
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showCats() {
        document.getElementById('catGrid').style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
    }

    loadData();
</script>
</body>
</html>
