<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Ai Restaurant Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap');

        body {
            font-family: 'Poppins', 'Tahoma', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid #38bdf8;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            margin-top: 10px;
            opacity: 0.8;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .food-card {
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .food-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
            border-color: #38bdf8;
        }

        .food-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .food-info {
            padding: 20px;
            text-align: center;
        }

        .food-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #f8fafc;
        }

        .food-price {
            font-size: 1.2rem;
            color: #38bdf8;
            font-weight: 700;
            background: rgba(56, 189, 248, 0.1);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
        }

        #loader {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 50px;
            color: #38bdf8;
        }

        footer {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Tech Ai Restaurant</h1>
        <p>ب خێر بێی بۆ خۆشترین خوارنێن مە</p>
    </header>

    <div class="container">
        <div id="loader"><i class="fas fa-spinner fa-spin"></i> ل هیڤیا بارکرنا خوارنان بە...</div>
        <div class="menu-grid" id="menu-container"></div>
    </div>

    <footer>
        &copy; 2026 Tech Ai - هەمی ماف د پاراستینە
    </footer>

    <script>
        // لێنکێ تە یێ CSV یێ گوگل شیت
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';

        async function loadMenu() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                
                // پارچەکرنا داتایان ب ڕێکا ڕێزکان
                const rows = data.split('\n').slice(1); 
                const menuContainer = document.getElementById('menu-container');
                const loader = document.getElementById('loader');

                loader.style.display = 'none';

                rows.forEach(row => {
                    const columns = row.split(',');
                    if (columns.length >= 3) {
                        const name = columns[0].trim();
                        const price = columns[1].trim();
                        const imageUrl = columns[2].trim();

                        if (name && price && imageUrl) {
                            const card = `
                                <div class="food-card">
                                    <img src="${imageUrl}" class="food-img" alt="${name}">
                                    <div class="food-info">
                                        <div class="food-name">${name}</div>
                                        <div class="food-price">${price} IQD</div>
                                    </div>
                                </div>
                            `;
                            menuContainer.innerHTML += card;
                        }
                    }
                });
            } catch (error) {
                document.getElementById('loader').innerHTML = "کێشەیەک د بارکرنا داتایان دا هەیە.";
                console.error("Error fetching data:", error);
            }
        }

        // دەستپێکرنا بارکرنا مینیۆیێ
        loadMenu();
    </script>
</body>
</html>
