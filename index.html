<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | Premium Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.9)), 
                        url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=2074&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            margin: 0;
            min-height: 100vh;
        }

        header {
            padding: 40px 15px;
            text-align: center;
            background: transparent; 
            border-bottom: 1px solid var(--glass-border);
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        header p { font-size: 0.9rem; opacity: 0.8; margin-top: 8px; }

        .container { max-width: 1200px; margin: auto; padding: 20px 12px; }

        /* جۆرێن خارنێ - Grid System */
        #catGrid, .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .cat-card, .food-card {
            background: var(--glass);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            transition: 0.3s;
            position: relative;
        }

        .cat-card { height: 200px; cursor: pointer; }
        
        .cat-img, .food-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: 0.5s;
        }

        .cat-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
        }

        .cat-overlay h3 {
            font-size: 1.5rem;
            font-weight: 700;
            border-bottom: 2px solid var(--primary);
        }

        /* بەشێ زانیاریێن خارنێ */
        .food-photo { height: 160px; opacity: 1; }
        .food-info { padding: 12px; text-align: center; }
        .food-info h3 { margin: 0; font-size: 1rem; font-weight: 700; height: 40px; overflow: hidden; }
        
        .price-tag {
            background: var(--primary);
            color: #000;
            padding: 4px 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 8px;
        }

        .back-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        /* --- گرنگترین بەش: ڕێکخستن بۆ موبایل (2 Items per row) --- */
        @media (max-width: 600px) {
            header { padding: 30px 10px; }
            header h1 { font-size: 1.8rem; }
            
            .container { padding: 15px 8px; }
            
            #catGrid, .food-grid {
                grid-template-columns: repeat(2, 1fr); /* دوو دانە د هەر ڕیزەکێ دا */
                gap: 10px; /* مەسافەیا ناڤبەرا وان کێمتر کر بۆ موبایلێ */
            }

            .cat-card { height: 150px; border-radius: 15px; }
            .cat-overlay h3 { font-size: 1.1rem; }
            
            .food-card { border-radius: 15px; }
            .food-photo { height: 130px; }
            .food-info { padding: 10px 5px; }
            .food-info h3 { font-size: 0.9rem; height: 35px; }
            .price-tag { font-size: 0.75rem; padding: 3px 8px; }
        }
    </style>
</head>
<body>

<header>
    <h1>TECH REST</h1>
    <p><i class="fas fa-map-marker-alt"></i> زاخۆ - دیزاینێ فەلاح محی الدین</p>
</header>

<div class="container">
    <div id="loader" style="text-align:center; padding: 50px;">
        <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
    </div>
    
    <div id="catGrid"></div>

    <div id="foodSection" style="display: none;">
        <button class="back-btn" onclick="showCats()">
            <i class="fas fa-arrow-right"></i> ڤەگەر
        </button>
        <div class="food-grid" id="foodGrid"></div>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [];

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            
            dataList = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                return { name: c[0], price: c[1], img: c[2], cat: c[3], catImg: c[4] };
            }).filter(item => item.cat && item.name);

            document.getElementById('loader').style.display = 'none';
            renderCategories();
        } catch(e) {
            console.error("Error loading CSV:", e);
        }
    }

    function renderCategories() {
        const catGrid = document.getElementById('catGrid');
        catGrid.style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
        
        const categories = [...new Set(dataList.map(item => item.cat))];
        catGrid.innerHTML = '';
        
        categories.forEach(cat => {
            const item = dataList.find(i => i.cat === cat);
            catGrid.innerHTML += `
                <div class="cat-card" onclick="openCat('${cat}')">
                    <img src="${item.catImg}" class="cat-img">
                    <div class="cat-overlay"><h3>${cat}</h3></div>
                </div>`;
        });
    }

    function openCat(catName) {
        document.getElementById('catGrid').style.display = 'none';
        document.getElementById('foodSection').style.display = 'block';
        const grid = document.getElementById('foodGrid');
        grid.innerHTML = '';
        
        dataList.filter(item => item.cat === catName).forEach(item => {
            grid.innerHTML += `
                <div class="food-card">
                    <img src="${item.img}" class="food-photo">
                    <div class="food-info">
                        <h3>${item.name}</h3>
                        <span class="price-tag">${item.price}</span>
                    </div>
                </div>`;
        });
        window.scrollTo(0,0);
    }

    function showCats() {
        document.getElementById('catGrid').style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
        window.scrollTo(0,0);
    }

    loadData();
</script>
</body>
</html>
