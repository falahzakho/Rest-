<!DOCTYPE html>
<html lang="ku" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | Menu & Cart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --card-bg: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0; padding-bottom: 50px; min-height: 100vh; color: #fff;
            background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                        url('https://i.postimg.cc/qRzMnWFV/photo-2026-05-09-18-07-24.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        /* Top Navigation */
        .top-nav {
            display: flex; gap: 10px; padding: 15px 20px;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            justify-content: flex-end;
        }

        .nav-btn {
            position: relative; cursor: pointer; background: rgba(56, 189, 248, 0.2);
            padding: 10px; border-radius: 12px; backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); display: flex; align-items: center;
        }

        #cart-count {
            position: absolute; top: -5px; right: -5px; background: var(--accent);
            color: #000; font-size: 0.75rem; font-weight: 900; padding: 2px 7px; border-radius: 50%;
        }

        header { padding: 100px 20px 30px; text-align: center; }
        header h1 { font-size: 2.5rem; color: var(--primary); font-weight: 900; margin: 0; }

        /* Categories */
        .categories-container { 
            position: sticky; top: 0; z-index: 100; background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(15px); padding: 15px 10px; overflow-x: auto; display: flex; gap: 12px;
        }
        .cat-btn { padding: 10px 25px; background: rgba(255,255,255,0.05); border-radius: 50px; cursor: pointer; border: 1px solid var(--glass-border); white-space: nowrap; color: #ccc; }
        .cat-btn.active { background: var(--primary); color: #000; font-weight: 700; }

        /* Food Grid */
        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .food-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--glass-border); display: flex; flex-direction: column; position: relative;
        }
        .food-img { width: 100%; height: 140px; background-size: cover; background-position: center; }
        .food-info { padding: 15px; text-align: center; }
        .price-tag { background: var(--accent); color: #000; padding: 5px 12px; border-radius: 12px; font-weight: 900; }
        .add-btn { position: absolute; top: 10px; left: 10px; background: var(--primary); color: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; }

        /* Cart Panel */
        #cart-panel {
            position: fixed; top: 0; right: -100%; width: 90%; height: 100%; background: #0f172a;
            z-index: 2000; transition: 0.4s; padding: 25px; display: flex; flex-direction: column;
        }
        #cart-panel.open { right: 0; }
        
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 10px; border-bottom: 1px solid var(--glass-border); background: rgba(255,255,255,0.03);
            margin-bottom: 10px; border-radius: 15px;
        }
        .qty-controls { display: flex; align-items: center; gap: 12px; }
        .qty-btn { background: var(--primary); color: #000; border: none; width: 30px; height: 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #total-area {
            margin-top: auto; padding: 20px; border-top: 2px solid var(--glass-border);
            text-align: center;
        }
        .total-price-text { font-size: 1.5rem; color: var(--accent); font-weight: 900; }

        /* Modals */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 3000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card { background: #1e293b; padding: 25px; border-radius: 25px; border: 1px solid var(--primary); width: 100%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid var(--glass-border); color: white; border-radius: 10px; }
        
        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        #admin-float-btn {
            display: none; position: fixed; bottom: 20px; right: 20px; 
            background: #10b981; width: 60px; height: 60px; border-radius: 50%;
            align-items: center; justify-content: center; font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; z-index: 1000;
        }

        .menu-section { display: none; }
        .menu-section.active { display: block; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-btn" onclick="openLoginModal()"><i class="fas fa-user-circle fa-lg" style="color: var(--accent);"></i></div>
    <div class="nav-btn" onclick="toggleLang()"><i class="fas fa-language fa-lg"></i></div>
    <div class="nav-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket fa-lg" style="color: var(--primary);"></i>
        <span id="cart-count">0</span>
    </div>
</div>

<header><h1>TECH REST</h1></header>

<!-- Modals -->
<div id="login-modal" class="modal">
    <div class="modal-card">
        <h3>چوونەژوورەوا رێڤەبەری</h3>
        <input type="text" id="user-input" placeholder="User Name">
        <input type="password" id="pass-input" placeholder="Password">
        <button class="action-btn" style="background: var(--primary);" onclick="checkLogin()">دخول</button>
        <button class="action-btn" style="background: #444; color: #fff;" onclick="closeModals()">پاشوەزین</button>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-card">
        <h3>زێدەکرنا بەرهەمێ نوو</h3>
        <input type="text" id="new-ku" placeholder="ناڤێ بەرهەمی (KU)">
        <input type="text" id="new-en" placeholder="Item Name (EN)">
        <input type="text" id="new-price" placeholder="بها (نموونە: 5,000)">
        <input type="text" id="new-img" placeholder="لینکا وێنەی">
        <input type="text" id="new-cat" placeholder="ناڤێ بەشێ (Category)">
        <button class="action-btn" style="background: var(--primary);" onclick="addNewItem()">دروست بکە</button>
        <button class="action-btn" style="background: #ef4444; color: #fff;" onclick="closeModals()">داخستن</button>
    </div>
</div>

<div id="admin-float-btn" onclick="openAdminModal()"><i class="fas fa-plus"></i></div>

<!-- Cart Panel -->
<div id="cart-panel">
    <h2 style="color: var(--primary); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">سەلکا من</h2>
    <div id="cart-list" style="flex-grow:1; overflow-y:auto; padding: 10px 0;"></div>
    
    <div id="total-area">
        <div style="font-size: 1rem; color: #ccc;">کۆمێ گشتی (Total):</div>
        <div class="total-price-text"><span id="grand-total">0</span> IQD</div>
    </div>

    <button class="action-btn" style="background: #ef4444; color: #fff;" onclick="clearCart()">پاککرنا سەلکێ</button>
    <button class="action-btn" style="background: var(--primary);" onclick="toggleCart()">بەردەوام بە</button>
</div>

<div class="categories-container" id="catBar"></div>
<div id="menuContent"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [], cart = {}, currentLang = 'ku', isAdmin = false;

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            dataList = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                if (c.length < 4) return null;
                // Use English name as unique ID
                return { id: c[0], price: c[1], img: c[2], cat: c[3], name_ku: c[4] || c[0], name_ar: c[5] || c[0], name_en: c[0] };
            }).filter(i => i);
            renderMenu();
        } catch (e) { console.error(e); }
    }

    function renderMenu() {
        const catBar = document.getElementById('catBar');
        const menuContent = document.getElementById('menuContent');
        catBar.innerHTML = ''; menuContent.innerHTML = '';
        const cats = [...new Set(dataList.map(i => i.cat))];

        cats.forEach((cat, index) => {
            const btn = document.createElement('div');
            btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`sec-${cat.replace(/\s+/g, '-')}`).classList.add('active');
            };
            catBar.appendChild(btn);

            const section = document.createElement('div');
            section.id = `sec-${cat.replace(/\s+/g, '-')}`;
            section.className = `menu-section ${index === 0 ? 'active' : ''}`;
            const grid = document.createElement('div');
            grid.className = 'food-grid';

            dataList.filter(f => f.cat === cat).forEach(food => {
                const name = currentLang === 'ku' ? food.name_ku : (currentLang === 'ar' ? food.name_ar : food.name_en);
                grid.innerHTML += `
                    <div class="food-card">
                        <button class="add-btn" onclick="addToCart('${food.id}')"><i class="fas fa-plus"></i></button>
                        <div class="food-img" style="background-image: url('${food.img}')"></div>
                        <div class="food-info">
                            <h3 style="font-size:0.9rem; margin:5px 0;">${name}</h3>
                            <span class="price-tag" style="font-size:0.8rem;">${food.price}</span>
                        </div>
                    </div>`;
            });
            section.appendChild(grid);
            menuContent.appendChild(section);
        });
    }

    function addToCart(id) {
        if (cart[id]) {
            cart[id].qty++;
        } else {
            const item = dataList.find(i => i.id === id);
            cart[id] = { ...item, qty: 1 };
        }
        updateCartUI();
    }

    function removeFromCart(id) {
        if (cart[id]) {
            cart[id].qty--;
            if (cart[id].qty <= 0) delete cart[id];
        }
        updateCartUI();
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        const grandTotalDisplay = document.getElementById('grand-total');
        list.innerHTML = '';
        let totalItems = 0;
        let grandTotal = 0;

        Object.values(cart).forEach(item => {
            totalItems += item.qty;
            
            // Clean price for calculation (remove commas/text)
            let cleanPrice = item.price.replace(/,/g, '').replace(/[^\d]/g, '');
            let priceNum = parseInt(cleanPrice) || 0;
            grandTotal += (priceNum * item.qty);

            const name = currentLang === 'ku' ? item.name_ku : (currentLang === 'ar' ? item.name_ar : item.name_en);
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:bold; font-size:0.95rem;">${name}</div>
                        <div style="font-size:0.8rem; color:var(--primary)">${item.price}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="removeFromCart('${item.id}')">-</button>
                        <span style="font-weight:bold; min-width:20px; text-align:center;">${item.qty}</span>
                        <button class="qty-btn" onclick="addToCart('${item.id}')">+</button>
                    </div>
                </div>`;
        });

        document.getElementById('cart-count').innerText = totalItems;
        grandTotalDisplay.innerText = grandTotal.toLocaleString();
    }

    function clearCart() { cart = {}; updateCartUI(); toggleCart(); }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }
    function openLoginModal() { document.getElementById('login-modal').style.display = 'flex'; }
    function openAdminModal() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    function checkLogin() {
        if (document.getElementById('user-input').value === "falah2y" && document.getElementById('pass-input').value === "243243ff") {
            isAdmin = true;
            document.getElementById('admin-float-btn').style.display = 'flex';
            closeModals();
            alert("رێڤەبەر هاتە ناسین!");
        } else { alert("خەلەتە!"); }
    }

    function addNewItem() {
        const newItem = {
            id: document.getElementById('new-en').value,
            name_ku: document.getElementById('new-ku').value,
            name_en: document.getElementById('new-en').value,
            price: document.getElementById('new-price').value,
            img: document.getElementById('new-img').value,
            cat: document.getElementById('new-cat').value || "گشتی"
        };
        dataList.push(newItem);
        renderMenu();
        closeModals();
    }

    function toggleLang() {
        currentLang = currentLang === 'ku' ? 'en' : (currentLang === 'en' ? 'ar' : 'ku');
        renderMenu();
        updateCartUI();
    }

    loadData();
</script>
</body>
</html>
