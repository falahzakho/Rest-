<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | خوارنگەها تێك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');
        :root { --primary: #38bdf8; --bg: #020617; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: radial-gradient(circle at top, #0f172a, #020617); color: #fff; margin: 0; min-height: 100vh; text-align: center; }
        header { padding: 50px 20px; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(to right, #38bdf8, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* لاپەڕێ جۆرێن خارنێ */
        #catGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }
        .cat-card { position: relative; height: 220px; border-radius: 25px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; }
        .cat-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .cat-img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .cat-overlay { position: relative; z-index: 2; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }
        .cat-overlay h3 { font-size: 1.8rem; font-weight: 700; text-shadow: 2px 2px 10px #000; }

        /* لاپەڕێ خارنان */
        #foodSection { display: none; }
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .food-card { background: var(--glass); border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .food-photo { width: 100%; height: 220px; object-fit: cover; }
        .food-info { padding: 20px; text-align: right; }
        .price-tag { background: var(--primary); color: #000; padding: 5px 15px; border-radius: 10px; font-weight: 700; display: inline-block; margin-top: 10px; }
        .back-btn { background: var(--primary); color: #000; border: none; padding: 10px 25px; border-radius: 50px; cursor: pointer; margin-bottom: 30px; font-weight: 700; }
        #loader { margin-top: 100px; font-size: 1.5rem; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <h1>TECH REST</h1>
    <p>زاخۆ - ب سەرپەرشتیا فەلاح محی الدین</p>
</header>

<div class="container">
    <div id="loader"><i class="fas fa-spinner fa-spin"></i> کێمەک ل هیڤیێ بە...</div>
    
    <!-- لێرە تەنێ جۆرێن خارنێ دیار دبن (پیتزا، بۆرگەر) -->
    <div id="catGrid"></div>

    <!-- لێرە خارنێن وی جۆری دیار دبن -->
    <div id="foodSection">
        <button class="back-btn" onclick="showCats()"><i class="fas fa-arrow-right"></i> ڤەگەر بۆ سەرەکی</button>
        <h2 id="currentCatTitle" style="color: #fbbf24; text-align: right; margin-bottom: 25px;"></h2>
        <div class="food-grid" id="foodGrid"></div>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [];

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            
            dataList = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                return {
                    name: c[0],     // Column A: Name
                    price: c[1],    // Column B: Price
                    img: c[2],      // Column C: Image
                    cat: c[3],      // Column D: Category (بۆرگەر، پیتزا)
                    catImg: c[4]    // Column E: CatImage
                };
            }).filter(item => item.cat && item.name);

            document.getElementById('loader').style.display = 'none';
            renderCategories();
        } catch(e) {
            document.getElementById('loader').innerText = "کێشەیەک د ئینتەرنێتێ دا هەیە.";
        }
    }

    function renderCategories() {
        const catGrid = document.getElementById('catGrid');
        catGrid.style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
        
        // دروستکرنا لیستەکا جۆرێن خارنێ بێی دووبارەبوون
        const categories = [...new Set(dataList.map(item => item.cat))];
        catGrid.innerHTML = '';
        
        categories.forEach(cat => {
            const item = dataList.find(i => i.cat === cat);
            catGrid.innerHTML += `
                <div class="cat-card" onclick="openCat('${cat}')">
                    <img src="${item.catImg}" class="cat-img">
                    <div class="cat-overlay">
                        <h3>${cat}</h3>
                    </div>
                </div>`;
        });
    }

    function openCat(catName) {
        document.getElementById('catGrid').style.display = 'none';
        document.getElementById('foodSection').style.display = 'block';
        document.getElementById('currentCatTitle').innerText = "بەشێ " + catName;
        
        const grid = document.getElementById('foodGrid');
        grid.innerHTML = '';
        const filtered = dataList.filter(item => item.cat === catName);
        
        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="food-card">
                    <img src="${item.img}" class="food-photo">
                    <div class="food-info">
                        <h3>${item.name}</h3>
                        <span class="price-tag">${item.price} IQD</span>
                    </div>
                </div>`;
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showCats() {
        document.getElementById('catGrid').style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
    }

    loadData();
</script>
</body>
</html>
