<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Ai Restaurant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap');
        :root { --primary: #38bdf8; --bg: #020617; --card: rgba(30, 41, 59, 0.7); }
        body { font-family: 'Poppins', 'Tahoma', sans-serif; background-color: var(--bg); color: #fff; margin: 0; text-align: center; overflow-x: hidden; }
        header { padding: 40px 20px; background: linear-gradient(to bottom, #0f172a, var(--bg)); border-bottom: 1px solid rgba(56, 189, 248, 0.2); }
        .container { max-width: 1100px; margin: auto; padding: 20px; min-height: 60vh; }

        /* لاپەڕێ دەستپێکێ - تەنێ بەش */
        #catGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .cat-card { position: relative; height: 250px; border-radius: 25px; overflow: hidden; cursor: pointer; border: 2px solid rgba(56, 189, 248, 0.2); transition: 0.4s; }
        .cat-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(56, 189, 248, 0.3); }
        .cat-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; z-index: 1; top:0; left:0; }
        .cat-overlay { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); }
        .cat-overlay i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .cat-overlay h3 { font-size: 1.8rem; margin: 0; }

        /* بەشێ خوارنان */
        #foodSection { display: none; }
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .food-item { background: var(--card); border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .food-img { width: 100%; height: 200px; object-fit: cover; }
        .food-info { padding: 20px; }
        .food-price { background: var(--primary); color: #000; padding: 5px 15px; border-radius: 10px; font-weight: bold; display: inline-block; margin-top: 10px; }
        
        .back-btn { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 15px; cursor: pointer; margin-bottom: 30px; font-weight: bold; font-size: 1.1rem; }
        #loader { font-size: 1.5rem; color: var(--primary); margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <h1>TECH AI RESTAURANT</h1>
    <p>زاخۆ - ب سەرپەرشتیا فەلاح محی الدین</p>
</header>

<div class="container">
    <div id="loader"><i class="fas fa-spinner fa-spin"></i> ل هیڤیا بارکرنێ بە...</div>
    <div id="catGrid"></div>
    <div id="foodSection">
        <button class="back-btn" onclick="showCats()"><i class="fas fa-arrow-right"></i> ڤەگەر بۆ سەرەکی</button>
        <h2 id="currentCatTitle" style="color: var(--primary); margin-bottom: 30px;"></h2>
        <div class="food-grid" id="foodGrid"></div>
    </div>
</div>

<script>
    // لێنکێ CSV یێ تە یێ فەرمی
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [];

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            
            dataList = rows.map(r => {
                const c = r.split(',').map(v => v.replace(/"/g, '').trim());
                return { name: c[0], price: c[1], img: c[2], cat: c[3], catImg: c[4] };
            }).filter(item => item.name && item.cat);

            document.getElementById('loader').style.display = 'none';
            renderCategories();
        } catch(e) { 
            document.getElementById('loader').innerText = "کێشەیەک د بارکرنێ دا هەیە.";
        }
    }

    function renderCategories() {
        const catGrid = document.getElementById('catGrid');
        catGrid.style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
        
        const categories = [...new Set(dataList.map(item => item.cat))];
        catGrid.innerHTML = '';
        categories.forEach(cat => {
            const item = dataList.find(i => i.cat === cat);
            const icon = cat.includes('بيتزا') ? 'fa-pizza-slice' : (cat.includes('شاورمه') ? 'fa-hamburger' : 'fa-drumstick-bite');
            catGrid.innerHTML += `
                <div class="cat-card" onclick="openCat('${cat}')">
                    <img src="${item.catImg}" class="cat-bg">
                    <div class="cat-overlay">
                        <i class="fas ${icon}"></i>
                        <h3>${cat}</h3>
                    </div>
                </div>`;
        });
    }

    function openCat(catName) {
        document.getElementById('catGrid').style.display = 'none';
        document.getElementById('foodSection').style.display = 'block';
        document.getElementById('currentCatTitle').innerText = "بەشێ: " + catName;
        
        const grid = document.getElementById('foodGrid');
        grid.innerHTML = '';
        const filtered = dataList.filter(item => item.cat === catName);
        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="food-item">
                    <img src="${item.img}" class="food-img">
                    <div class="food-info">
                        <h3>${item.name}</h3>
                        <span class="food-price">${item.price} IQD</span>
                    </div>
                </div>`;
        });
        window.scrollTo(0,0);
    }

    function showCats() {
        document.getElementById('catGrid').style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
    }

    loadData();
</script>
</body>
</html>
