<!DOCTYPE html>
<html lang="ku" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | Full Multilingual</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --danger: #ef4444;
            --card-bg: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0; padding-bottom: 50px; min-height: 100vh; color: #fff;
            background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                        url('https://i.postimg.cc/qRzMnWFV/photo-2026-05-09-18-07-24.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .top-nav {
            display: flex; gap: 10px; padding: 15px 20px;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            justify-content: flex-end;
        }

        .nav-btn {
            position: relative; cursor: pointer; background: rgba(56, 189, 248, 0.2);
            padding: 10px; border-radius: 12px; backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); display: flex; align-items: center;
        }

        #cart-count {
            position: absolute; top: -5px; right: -5px; background: var(--accent);
            color: #000; font-size: 0.75rem; font-weight: 900; padding: 2px 7px; border-radius: 50%;
        }

        header { padding: 100px 20px 30px; text-align: center; }
        header h1 { font-size: 2.5rem; color: var(--primary); font-weight: 900; margin: 0; }

        .categories-container { 
            position: sticky; top: 0; z-index: 100; background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(15px); padding: 15px 10px; overflow-x: auto; display: flex; gap: 12px;
        }
        .cat-btn { padding: 10px 25px; background: rgba(255,255,255,0.05); border-radius: 50px; cursor: pointer; border: 1px solid var(--glass-border); white-space: nowrap; color: #ccc; }
        .cat-btn.active { background: var(--primary); color: #000; font-weight: 700; }

        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .food-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--glass-border); display: flex; flex-direction: column; position: relative;
        }
        .food-img { width: 100%; height: 140px; background-size: cover; background-position: center; }
        .food-info { padding: 15px; text-align: center; }
        .price-tag { background: var(--accent); color: #000; padding: 5px 12px; border-radius: 12px; font-weight: 900; }
        
        .add-btn { position: absolute; top: 10px; left: 10px; background: var(--primary); color: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; }
        .delete-btn { display: none; position: absolute; top: 10px; right: 10px; background: var(--danger); color: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; align-items: center; justify-content: center; }

        #cart-panel {
            position: fixed; top: 0; right: -100%; width: 90%; height: 100%; background: #0f172a;
            z-index: 2000; transition: 0.4s; padding: 25px; display: flex; flex-direction: column;
        }
        #cart-panel.open { right: 0; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: #1e293b; padding: 25px; border-radius: 25px; border: 1px solid var(--primary); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid var(--glass-border); color: white; border-radius: 10px; text-align: inherit; }
        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        #admin-float-btn { display: none; position: fixed; bottom: 20px; right: 20px; background: #10b981; width: 60px; height: 60px; border-radius: 50%; align-items: center; justify-content: center; font-size: 24px; z-index: 1000; cursor: pointer; }
        .menu-section { display: none; }
        .menu-section.active { display: block; }
    </style>
</head>
<body dir="rtl">

<div class="top-nav">
    <div class="nav-btn" onclick="openLoginModal()"><i class="fas fa-user-circle fa-lg" style="color: var(--accent);"></i></div>
    <div class="nav-btn" onclick="toggleLang()"><span id="lang-label" style="font-weight: 900; font-size: 0.8rem;">KU</span></div>
    <div class="nav-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket fa-lg" style="color: var(--primary);"></i>
        <span id="cart-count">0</span>
    </div>
</div>

<header><h1>TECH REST</h1></header>

<div id="login-modal" class="modal">
    <div class="modal-card">
        <h3 id="t-login-title">چوونەژوورەوا رێڤەبەری</h3>
        <input type="text" id="user-input" placeholder="User Name">
        <input type="password" id="pass-input" placeholder="Password">
        <button class="action-btn" style="background: var(--primary);" onclick="checkLogin()" id="t-login-btn">دخول</button>
        <button class="action-btn" style="background: #444; color: #fff;" onclick="closeModals()" id="t-cancel-btn">پاشوەزین</button>
    </div>
</div>

<div id="confirm-delete-modal" class="modal">
    <div class="modal-card">
        <i class="fas fa-trash-alt fa-3x" style="color: var(--danger); margin-bottom: 15px;"></i>
        <h3 id="t-confirm-del">کاتو رازی زێبچیت؟</h3>
        <div style="display:flex; gap:10px;">
            <button class="action-btn" style="background: var(--danger); color: white;" id="t-accept-del">قبوول</button>
            <button class="action-btn" style="background: #444; color: white;" onclick="closeModals()" id="t-reject-del">رفض</button>
        </div>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-card">
        <h3 id="t-add-title">زێدەکرنا بەرهەمێ نوو</h3>
        <input type="text" id="new-ku" placeholder="ناڤێ بەرهەمی (KU)">
        <input type="text" id="new-en" placeholder="Item Name (EN)">
        <input type="text" id="new-price" placeholder="بها (Price)">
        <input type="text" id="new-img" placeholder="لینکا وێنەی (Image Link)">
        <input type="text" id="new-cat" placeholder="بەش (Category)">
        <button class="action-btn" style="background: var(--primary);" onclick="addNewItem()" id="t-create-btn">دروست بکە</button>
        <button class="action-btn" style="background: #ef4444; color: #fff;" onclick="closeModals()" id="t-close-btn">داخستن</button>
    </div>
</div>

<div id="admin-float-btn" onclick="openAdminModal()"><i class="fas fa-plus"></i></div>

<div id="cart-panel">
    <h2 id="t-cart-title" style="color: var(--primary); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">سەلکا من</h2>
    <div id="cart-list" style="flex-grow:1; overflow-y:auto; padding: 10px 0;"></div>
    <div id="total-area" style="text-align:center; padding:15px; border-top:1px solid var(--glass-border);">
        <span id="t-total-label">کۆمێ گشتی:</span>
        <div class="total-price-text"><span id="grand-total">0</span> IQD</div>
    </div>
    <button class="action-btn" style="background: #ef4444; color: #fff;" onclick="clearCart()" id="t-clear-cart">پاککرنا سەلکێ</button>
    <button class="action-btn" style="background: var(--primary);" onclick="toggleCart()" id="t-continue-btn">بەردەوام بە</button>
</div>

<div class="categories-container" id="catBar"></div>
<div id="menuContent"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    
    // --- Translations Dictionary ---
    const i18n = {
        ku: {
            loginTitle: "چوونەژوورەوا رێڤەبەری", loginBtn: "دخول", cancelBtn: "پاشوەزین",
            confirmDel: "کاتو رازی زێبچیت؟", accept: "قبوول", reject: "رفض",
            addTitle: "زێدەکرنا بەرهەمێ نوو", createBtn: "دروست بکە", closeBtn: "داخستن",
            cartTitle: "سەلکا من", totalLabel: "کۆمێ گشتی:", clearCart: "پاککرنا سەلکێ", continueBtn: "بەردەوام بە",
            dir: "rtl", langLabel: "KU"
        },
        ar: {
            loginTitle: "تسجيل دخول المشرف", loginBtn: "دخول", cancelBtn: "إلغاء",
            confirmDel: "هل أنت متأكد من الحذف؟", accept: "قبول", reject: "رفض",
            addTitle: "إضافة منتج جديد", createBtn: "إضافة", closeBtn: "إغلاق",
            cartTitle: "سلتي", totalLabel: "المجموع الكلي:", clearCart: "تفريغ السلة", continueBtn: "استمرار",
            dir: "rtl", langLabel: "AR"
        },
        en: {
            loginTitle: "Admin Login", loginBtn: "Login", cancelBtn: "Cancel",
            confirmDel: "Are you sure you want to delete?", accept: "Accept", reject: "Reject",
            addTitle: "Add New Product", createBtn: "Create", closeBtn: "Close",
            cartTitle: "My Cart", totalLabel: "Grand Total:", clearCart: "Clear Cart", continueBtn: "Continue",
            dir: "ltr", langLabel: "EN"
        }
    };

    let dataList = [], cart = {}, currentLang = 'ku', isAdmin = false;
    let targetDeleteId = null;

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            dataList = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                if (c.length < 4) return null;
                return { id: c[0], price: c[1], img: c[2], cat: c[3], name_ku: c[4] || c[0], name_ar: c[5] || c[0], name_en: c[0] };
            }).filter(i => i);
            renderMenu();
            updateUIStrings();
        } catch (e) { console.error(e); }
    }

    function updateUIStrings() {
        const t = i18n[currentLang];
        document.getElementById('mainHtml').dir = t.dir;
        document.body.dir = t.dir;
        document.getElementById('lang-label').innerText = t.langLabel;
        
        // Modal Texts
        document.getElementById('t-login-title').innerText = t.loginTitle;
        document.getElementById('t-login-btn').innerText = t.loginBtn;
        document.getElementById('t-cancel-btn').innerText = t.cancelBtn;
        document.getElementById('t-confirm-del').innerText = t.confirmDel;
        document.getElementById('t-accept-del').innerText = t.accept;
        document.getElementById('t-reject-del').innerText = t.reject;
        document.getElementById('t-add-title').innerText = t.addTitle;
        document.getElementById('t-create-btn').innerText = t.createBtn;
        document.getElementById('t-close-btn').innerText = t.closeBtn;
        
        // Cart Texts
        document.getElementById('t-cart-title').innerText = t.cartTitle;
        document.getElementById('t-total-label').innerText = t.totalLabel;
        document.getElementById('t-clear-cart').innerText = t.clearCart;
        document.getElementById('t-continue-btn').innerText = t.continueBtn;
    }

    function toggleLang() {
        if (currentLang === 'ku') currentLang = 'en';
        else if (currentLang === 'en') currentLang = 'ar';
        else currentLang = 'ku';
        
        updateUIStrings();
        renderMenu();
        updateCartUI();
    }

    function renderMenu() {
        const catBar = document.getElementById('catBar');
        const menuContent = document.getElementById('menuContent');
        catBar.innerHTML = ''; menuContent.innerHTML = '';
        const cats = [...new Set(dataList.map(i => i.cat))];

        cats.forEach((cat, index) => {
            const btn = document.createElement('div');
            btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`sec-${cat.replace(/\s+/g, '-')}`).classList.add('active');
            };
            catBar.appendChild(btn);

            const section = document.createElement('div');
            section.id = `sec-${cat.replace(/\s+/g, '-')}`;
            section.className = `menu-section ${index === 0 ? 'active' : ''}`;
            const grid = document.createElement('div');
            grid.className = 'food-grid';

            dataList.filter(f => f.cat === cat).forEach(food => {
                const name = currentLang === 'ku' ? food.name_ku : (currentLang === 'ar' ? food.name_ar : food.name_en);
                const showDel = isAdmin ? 'display:flex' : 'display:none';
                grid.innerHTML += `
                    <div class="food-card">
                        <button class="add-btn" onclick="addToCart('${food.id}')"><i class="fas fa-plus"></i></button>
                        <button class="delete-btn" style="${showDel}" onclick="promptDelete('${food.id}')"><i class="fas fa-minus"></i></button>
                        <div class="food-img" style="background-image: url('${food.img}')"></div>
                        <div class="food-info">
                            <h3 style="font-size:0.9rem; margin:5px 0;">${name}</h3>
                            <span class="price-tag">${food.price}</span>
                        </div>
                    </div>`;
            });
            section.appendChild(grid);
            menuContent.appendChild(section);
        });
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        let totalItems = 0, grandTotal = 0;
        Object.values(cart).forEach(item => {
            totalItems += item.qty;
            let priceNum = parseInt(item.price.replace(/,/g, '').replace(/[^\d]/g, '')) || 0;
            grandTotal += (priceNum * item.qty);
            const name = currentLang === 'ku' ? item.name_ku : (currentLang === 'ar' ? item.name_ar : item.name_en);
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">
                <span>${name} (x${item.qty})</span>
                <span>${item.price}</span>
            </div>`;
        });
        document.getElementById('cart-count').innerText = totalItems;
        document.getElementById('grand-total').innerText = grandTotal.toLocaleString();
    }

    // --- Core Functions ---
    function checkLogin() {
        if (document.getElementById('user-input').value === "falah2y" && document.getElementById('pass-input').value === "243243ff") {
            isAdmin = true;
            document.getElementById('admin-float-btn').style.display = 'flex';
            closeModals(); renderMenu(); alert("Success!");
        } else alert("Wrong!");
    }
    function addToCart(id) { if(cart[id]) cart[id].qty++; else cart[id] = {...dataList.find(i=>i.id===id), qty:1}; updateCartUI(); }
    function promptDelete(id) { targetDeleteId = id; document.getElementById('confirm-delete-modal').style.display = 'flex'; document.getElementById('t-accept-del').onclick = executeDelete; }
    function executeDelete() { dataList = dataList.filter(i => i.id !== targetDeleteId); renderMenu(); closeModals(); }
    function clearCart() { cart = {}; updateCartUI(); }
    function openLoginModal() { document.getElementById('login-modal').style.display = 'flex'; }
    function openAdminModal() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }

    loadData();
</script>
</body>
</html>
