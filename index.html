<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | Premium Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            /* پاشبنەمایەکێ برۆفیشنال و تاری */
            background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                        url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=2074&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            margin: 0;
            min-height: 100vh;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .container { max-width: 1200px; margin: auto; padding: 40px 20px; }

        /* جۆرێن خارنێ - Categories */
        #catGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .cat-card {
            position: relative;
            height: 280px;
            border-radius: 30px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cat-card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.2);
        }

        .cat-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s;
        }

        .cat-card:hover .cat-img { transform: scale(1.1); opacity: 0.4; }

        .cat-overlay {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
        }

        .cat-overlay h3 {
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            border-bottom: 3px solid var(--primary);
        }

        /* بەشێ خوارنان - Food Items */
        #foodSection { display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .food-card {
            background: var(--glass);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            transition: 0.3s;
        }

        .food-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .food-photo { width: 100%; height: 240px; object-fit: cover; }

        .food-info { padding: 25px; text-align: right; }
        
        .food-info h3 { margin: 0; font-size: 1.4rem; color: #fff; }

        .price-tag {
            background: linear-gradient(45deg, var(--primary), #818cf8);
            color: #000;
            padding: 8px 20px;
            border-radius: 15px;
            font-weight: 900;
            display: inline-block;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .back-btn {
            background: none;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 40px;
            font-weight: 700;
            transition: 0.3s;
        }

        .back-btn:hover { background: var(--primary); color: #000; }

        #loader { margin-top: 100px; font-size: 1.8rem; font-weight: 700; color: var(--primary); }

        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            #catGrid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>TECH REST</h1>
    <p><i class="fas fa-map-marker-alt"></i> زاخۆ - دیزاینێ فەلاح محی الدین</p>
</header>

<div class="container">
    <div id="loader">
        <i class="fas fa-utensils fa-spin"></i> کێمەک ل هیڤیێ بە...
    </div>
    
    <div id="catGrid"></div>

    <div id="foodSection">
        <button class="back-btn" onclick="showCats()">
            <i class="fas fa-chevron-right"></i> ڤەگەر بۆ جۆرێن خارنێ
        </button>
        <h2 id="currentCatTitle" style="color: var(--accent); text-align: right; margin-bottom: 30px; font-size: 2rem;"></h2>
        <div class="food-grid" id="foodGrid"></div>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [];

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            
            dataList = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                return {
                    name: c[0],     
                    price: c[1],    
                    img: c[2],      
                    cat: c[3],      
                    catImg: c[4]    
                };
            }).filter(item => item.cat && item.name);

            document.getElementById('loader').style.display = 'none';
            renderCategories();
        } catch(e) {
            document.getElementById('loader').innerText = "کێشەیەک د ئینتەرنێتێ دا هەیە.";
        }
    }

    function renderCategories() {
        const catGrid = document.getElementById('catGrid');
        catGrid.style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
        
        const categories = [...new Set(dataList.map(item => item.cat))];
        catGrid.innerHTML = '';
        
        categories.forEach(cat => {
            const item = dataList.find(i => i.cat === cat);
            catGrid.innerHTML += `
                <div class="cat-card" onclick="openCat('${cat}')">
                    <img src="${item.catImg}" class="cat-img">
                    <div class="cat-overlay">
                        <h3>${cat}</h3>
                    </div>
                </div>`;
        });
    }

    function openCat(catName) {
        document.getElementById('catGrid').style.display = 'none';
        document.getElementById('foodSection').style.display = 'block';
        document.getElementById('currentCatTitle').innerText = "بەشێ " + catName;
        
        const grid = document.getElementById('foodGrid');
        grid.innerHTML = '';
        const filtered = dataList.filter(item => item.cat === catName);
        
        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="food-card">
                    <img src="${item.img}" class="food-photo">
                    <div class="food-info">
                        <h3>${item.name}</h3>
                        <span class="price-tag">${item.price} IQD</span>
                    </div>
                </div>`;
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showCats() {
        document.getElementById('catGrid').style.display = 'grid';
        document.getElementById('foodSection').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadData();
</script>
</body>
</html>
